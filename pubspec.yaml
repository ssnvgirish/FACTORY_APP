name: factory_app
description: "Window Frame and Sheet Manufacturing Factory Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  firebase_app_check: ^0.3.2+10
  firebase_data_connect: ^0.1.5+4

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Dependency Injection
  get_it: ^8.0.3

  # Date/Time
  intl: ^0.20.2

  # Local Storage
  shared_preferences: ^2.5.3

  # Charts
  fl_chart: ^0.70.2

  # Connectivity
  connectivity_plus: ^6.1.4

  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  firebase_auth_mocks: ^0.14.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/wudsy_nfc_logo.png
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
