# ═══════════════════════════════════════
# Users
# ═══════════════════════════════════════

type User @table {
  uid: String! @unique
  name: String!
  phone: String!
  password: String!
  email: String!
  roles: [String!]!
  assignedMachines: [String!]!
  fixedSalary: Float!
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp @default(expr: "request.time")
}

# ═══════════════════════════════════════
# Master / Reference Tables
# ═══════════════════════════════════════

type MasterMachine @table {
  name: String! @unique
  type: String!             # "frame", "sheet", "scrap"
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterShift @table {
  name: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterRole @table {
  code: String! @unique
  displayName: String!
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterFrameSection @table {
  name: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterFrameDensity @table {
  value: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterFrameColor @table {
  name: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterSheetThickness @table {
  value: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterSheetDensity @table {
  value: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterSheetColor @table {
  name: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterMaintenanceItem @table {
  name: String! @unique
  category: String!          # "frame", "scrap"
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

type MasterScrapProduct @table {
  name: String! @unique
  sortOrder: Int! @default(value: 0)
  isActive: Boolean! @default(value: true)
}

# ── Lookup / Weight / Target Tables ──

type MasterFrameWeight @table {
  section: String!
  density: String!
  weightPerFoot: Float!
}

type MasterSheetWeight @table {
  thickness: String!
  density: String!
  weightPerSqft: Float!
}

type MasterFrameTarget @table {
  section: String! @unique
  targetKgPerHour: Float!
}

type MasterSheetTarget @table {
  thickness: String! @unique
  targetFeetPerHour: Float!
}

type MasterSalaryWeightage @table {
  variable: String!
  label: String!
  category: String!          # "frame_sheet", "scrap"
  percentage: Float!
}

type MasterScrapTarget @table {
  product: String! @unique
  targetKgPerHour: Float!
}

