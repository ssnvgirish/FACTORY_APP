# ═══════════════════════════════════════
# Master Tables – CRUD Operations
# ═══════════════════════════════════════

# ── MasterMachine ──

query ListMasterMachines @auth(level: PUBLIC) {
  masterMachines(orderBy: [{ sortOrder: ASC }]) {
    id name type sortOrder isActive
  }
}

mutation InsertMasterMachine($name: String!, $type: String!, $sortOrder: Int!, $isActive: Boolean!) @auth(level: PUBLIC) {
  masterMachine_insert(data: { name: $name, type: $type, sortOrder: $sortOrder, isActive: $isActive })
}

mutation UpdateMasterMachine($id: MasterMachine_Key!, $name: String!, $type: String!, $sortOrder: Int!, $isActive: Boolean!) @auth(level: PUBLIC) {
  masterMachine_update(key: $id, data: { name: $name, type: $type, sortOrder: $sortOrder, isActive: $isActive })
}

mutation DeleteMasterMachine($id: MasterMachine_Key!) @auth(level: PUBLIC) {
  masterMachine_delete(key: $id)
}

