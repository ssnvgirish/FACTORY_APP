) @auth(level: PUBLIC) {
  scrapProductionDetailsReports(
    where: {
      machineNumber: { eq: $machineNumber }
      date: { eq: $date }
      shift: { eq: $shift }
    }
    limit: 1
  ) {
    id
    date
    machineNumber
    shift
    totalProductionWeight
    createdBy
    submittedAt
    scrapProductionLineItems_on_report {
      product
      weightPerBag
      totalBags
