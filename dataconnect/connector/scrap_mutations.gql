  $endTime: Timestamp!,
  $personDoingMaintenance: String!,
  $description: String!,
  $durationHours: Float!
) @auth(level: PUBLIC) {
  scrapMaintenanceEntry_insert(data: {
    report: $reportId
    maintenanceItem: $maintenanceItem
    startTime: $startTime
    endTime: $endTime
    personDoingMaintenance: $personDoingMaintenance
    description: $description
    durationHours: $durationHours
  })
}

query ListScrapMachineHealthReports(
  $machineNumber: String,
  $startDate: Date,
  $endDate: Date
) @auth(level: PUBLIC) {
  scrapMachineHealthReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
    orderBy: [{ date: DESC }]
  ) {
    id
    date
    machineNumber
    shift
    totalMaintenanceDurationHours
    createdBy
    submittedAt
    timestamp
    scrapMaintenanceEntries_on_report {
      maintenanceItem
      startTime
      endTime
      personDoingMaintenance
      description
      durationHours
    }
  }
}

