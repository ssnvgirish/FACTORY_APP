# ═══════════════════════════════════════
# Scrap Salary Mutations & Queries
# ═══════════════════════════════════════

mutation CreateScrapSalaryCalculation(
  $operatorId: String!,
  $operatorName: String!,
  $year: Int!,
  $month: Int!,
  $a: Float!,
  $b: Float!,
  $e: Float!,
  $f: Float!,
  $g: Float!,
  $wA: Float!,
  $wB: Float!,
  $wE: Float!,
  $wF: Float!,
  $wG: Float!,
  $multiplier: Float!,
  $fixedSalary: Float!,
  $calculatedSalary: Float!
) @auth(level: PUBLIC) {
  scrapSalaryCalculation_insert(data: {
    operatorId: $operatorId
    operatorName: $operatorName
    year: $year
    month: $month
    a: $a
    b: $b
    e: $e
    f: $f
    g: $g
    wA: $wA
    wB: $wB
    wE: $wE
    wF: $wF
    wG: $wG
    multiplier: $multiplier
    fixedSalary: $fixedSalary
    calculatedSalary: $calculatedSalary
  })
}

query GetScrapSalaryCalculation(
  $operatorId: String!,
  $year: Int!,
  $month: Int!
) @auth(level: PUBLIC) {
  scrapSalaryCalculations(
    where: {
      operatorId: { eq: $operatorId }
      year: { eq: $year }
      month: { eq: $month }
    }
    limit: 1
  ) {
    id
    operatorId
    operatorName
    year
    month
    a
    b
    e
    f
    g
    wA
    wB
    wE
    wF
    wG
    multiplier
    fixedSalary
    calculatedSalary
    timestamp
  }
}

query GetScrapSalaryWeightages @auth(level: PUBLIC) {
  masterSalaryWeightages(where: { category: { eq: "scrap" } }) {
    id
    variable
    label
    category
    percentage
  }
}

query GetScrapMonthlyAggregates(
  $machineNumber: String!,
  $startDate: Date!,
  $endDate: Date!
) @auth(level: PUBLIC) {
  scrapCleaningReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
  ) {
    percentage
  }
  scrapToolsCountReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
  ) {
    percentageAvailable
  }
  scrapProductionWeightReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
  ) {
    efficiencyPercentage
  }
  scrapWritingEfficiencies(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
  ) {
    score
  }
  scrapQualityReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
  ) {
    qualityRating
  }
}
