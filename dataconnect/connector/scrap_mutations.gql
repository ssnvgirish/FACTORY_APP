# ═══════════════════════════════════════
# Scrap/Regrind Report Mutations & Queries
# ═══════════════════════════════════════

mutation CreateScrapCleaningReport(
  $date: Date!,
  $machineNumber: String!,
  $machineCondition: Int!,
  $groundCondition: Int!,
  $totalScore: Int!,
  $percentage: Float!,
  $createdBy: String!
) @auth(level: PUBLIC) {
  scrapCleaningReport_insert(data: {
    date: $date
    machineNumber: $machineNumber
    machineCondition: $machineCondition
    groundCondition: $groundCondition
    totalScore: $totalScore
    percentage: $percentage
    createdBy: $createdBy
  })
}

query ListScrapCleaningReports(
  $machineNumber: String,
  $startDate: Date,
  $endDate: Date
) @auth(level: PUBLIC) {
  scrapCleaningReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
    orderBy: [{ date: DESC }]
  ) {
    id
    date
    machineNumber
    machineCondition
    groundCondition
    totalScore
    percentage
    createdBy
    timestamp
  }
}

