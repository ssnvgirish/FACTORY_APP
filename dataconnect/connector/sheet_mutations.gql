query ListSheetProductionDetailsReports(
  $machineNumber: String,
  $startDate: Date,
  $endDate: Date
) @auth(level: PUBLIC) {
  sheetProductionDetailsReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
    orderBy: [{ date: DESC }]
  ) {
    id
    date
    machineNumber
    shift
    totalQuantity
    totalWeight
    totalRunningFeet
    createdBy
    submittedAt
    timestamp
    sheetProductionLineItems_on_report {
      thickness
      density
      color
      length
      width
      quantity
      sqft
      perPieceWeight
      totalWeight
      totalRunningFeet
      timeOfChange
      manualWeightPerSqft
    }
  }
}

query GetSheetProductionDetailsReport(
  $machineNumber: String!,
  $date: Date!,
  $shift: String!
) @auth(level: PUBLIC) {
  sheetProductionDetailsReports(
    where: {
      machineNumber: { eq: $machineNumber }
      date: { eq: $date }
      shift: { eq: $shift }
    }
    limit: 1
  ) {
    id
    date
    machineNumber
    shift
    totalQuantity
    totalWeight
    totalRunningFeet
    createdBy
    submittedAt
    sheetProductionLineItems_on_report {
      thickness
      density
      color
      length
      width
      quantity
      sqft
      perPieceWeight
      totalWeight
      totalRunningFeet
    }
  }
}

