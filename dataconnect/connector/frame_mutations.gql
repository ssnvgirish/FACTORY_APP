query GetFrameProductionDetailsReport(
  $machineNumber: String!,
  $date: Date!,
  $shift: String!
) @auth(level: PUBLIC) {
  frameProductionDetailsReports(
    where: {
      machineNumber: { eq: $machineNumber }
      date: { eq: $date }
      shift: { eq: $shift }
    }
    limit: 1
  ) {
    id
    date
    machineNumber
    shift
    totalQuantity
    totalWeight
    createdBy
    submittedAt
    frameProductionLineItems_on_report {
      section
      density
      color
      length
      quantity
      perPieceWeight
      totalWeight
    }
  }
}

