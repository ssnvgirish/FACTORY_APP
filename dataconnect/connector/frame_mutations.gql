# ═══════════════════════════════════════
# Frame Report Mutations
# ═══════════════════════════════════════

mutation CreateFrameCleaningReport(
  $date: Date!,
  $machineNumber: String!,
  $machineCondition: Int!,
  $groundCondition: Int!,
  $mouldCondition: Int!,
  $totalScore: Int!,
  $percentage: Float!,
  $createdBy: String!
) @auth(level: PUBLIC) {
  frameCleaningReport_insert(data: {
    date: $date
    machineNumber: $machineNumber
    machineCondition: $machineCondition
    groundCondition: $groundCondition
    mouldCondition: $mouldCondition
    totalScore: $totalScore
    percentage: $percentage
    createdBy: $createdBy
  })
}

query ListFrameCleaningReports(
  $machineNumber: String,
  $startDate: Date,
  $endDate: Date
) @auth(level: PUBLIC) {
  frameCleaningReports(
    where: {
      _and: [
        { machineNumber: { eq: $machineNumber } }
        { date: { ge: $startDate } }
        { date: { le: $endDate } }
      ]
    }
    orderBy: [{ date: DESC }]
  ) {
    id
    date
    machineNumber
    machineCondition
    groundCondition
    mouldCondition
    totalScore
    percentage
    createdBy
    timestamp
  }
}

